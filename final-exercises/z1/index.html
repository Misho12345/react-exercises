<!DOCTYPE html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Профилна карта</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="profile-card">
      <div class="avatar">ИП</div>
      <h2 class="name">Иван Петров</h2>
      <span class="class-label">Клас 11А</span>
      <p class="average">Среден успех: <span class="grade high">5.25</span></p>

      <div class="subjects">
        <div class="subject">
          <span class="subject-name">Математика</span>
          <span class="grade high">5.50</span>
        </div>
        <div class="subject">
          <span class="subject-name">Физика</span>
          <span class="grade low">3.25</span>
        </div>
        <div class="subject">
          <span class="subject-name">Информатика</span>
          <span class="grade high">6.00</span>
        </div>
      </div>
    </div>
  </body>
</html>
